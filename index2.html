<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慈河</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif KR', Georgia, serif;
    background: #f5f3ee;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 3rem 1.5rem;
  }
  .title h1 { font-size: 2.2rem; font-weight: 400; color: #2a2320; letter-spacing: 0.1em; text-align: center; }
  .title p  { font-size: 13px; color: #999; margin-top: 6px; text-align: center; letter-spacing: 0.05em; }
  .links { display: flex; flex-direction: column; gap: 14px; width: 340px; }
  a {
    display: block;
    padding: 28px 32px;
    border-radius: 16px;
    border: 1px solid #ddd8d0;
    background: #fff;
    text-decoration: none;
    color: #2a2320;
    transition: background 0.15s, border-color 0.15s;
  }
  a:hover { background: #faf8f4; border-color: #bbb5ab; }
  a .label { font-size: 17px; font-weight: 500; letter-spacing: 0.05em; }
  a .sub   { font-size: 12px; color: #aaa; margin-top: 6px; letter-spacing: 0.03em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">
    <h1>慈河</h1>
    <p>도구 모음</p>
  </div>
  <div class="links">
    <a href="자하석문기.html">
      <div class="label">자하석문기</div>
      <div class="sub">石文記</div>
    </a>
    <a href="자하자전.html">
      <div class="label">자하자전</div>
      <div class="sub">字典</div>
    </a>
    <a href="자하절자기.html">
      <div class="label">자하절자기</div>
      <div class="sub">截字記</div>
    </a>
  </div>
</div>
</body>
</html>
